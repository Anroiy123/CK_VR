<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VR Color Circle</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
    <script src="js/starfield-sky.js"></script>
    <script src="js/grid-floor.js"></script>
    <script src="js/ambient-particles.js"></script>
    <script src="js/color-data.js"></script>
    <script src="js/tooltip.js"></script>
    <script src="js/grabber.js"></script>
    <script src="js/color-wheel.js"></script>
    <script src="js/color-ball.js"></script>
    <script src="js/shelf.js"></script>
    <script src="js/snap-to-slot.js"></script>
    <script src="js/ball-respawn.js"></script>
    <script src="js/particle-pool.js"></script>
    <script src="js/sound-manager.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/free-play.js"></script>
    <script src="js/vr-button.js"></script>
    <script src="js/ui-manager.js"></script>
    <script src="js/game-manager.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <a-scene
      id="vr-color-circle-scene"
      background="color: #0d1530"
      renderer="antialias: true; colorManagement: true; toneMapping: ACESFilmic; toneMappingExposure: 1.2"
      vr-mode-ui="enabled: true"
      embedded="false"
      desktop-grabber
    >
      <a-assets timeout="10000"></a-assets>

      <a-light type="ambient" color="#b8c4ff" intensity="0.85"></a-light>
      <a-light
        type="directional"
        color="#ffffff"
        intensity="0.65"
        position="1.5 3 2"
        castShadow="false"
      ></a-light>
      <a-light
        type="point"
        color="#9775fa"
        intensity="0.8"
        position="0 2.6 -2.22"
      ></a-light>

      <a-entity starfield-sky></a-entity>
      <a-entity grid-floor></a-entity>

      <a-entity
        id="camera-rig"
        position="0 0 0"
        movement-controls="fly: false; speed: 0.12"
      >
        <a-entity
          id="camera"
          camera
          position="0 1.6 0"
          look-controls="pointerLockEnabled: false"
        >
          <a-cursor
            cursor="rayOrigin: mouse; fuse: false"
            raycaster="objects: .interactive"
            color="#f8f9ff"
            geometry="primitive: ring; radiusInner: 0.012; radiusOuter: 0.018"
            material="shader: flat"
          ></a-cursor>

          <a-entity
            id="diegetic-hud"
            position="-1.92 0.75 -1.4"
            visible="false"
          >
            <!-- Neon glow outer layer (cyan) -->
            <a-plane
              width="0.96"
              height="0.68"
              color="#00d4ff"
              opacity="0.25"
              material="shader: flat; transparent: true; depthTest: false; emissive: #00d4ff; emissiveIntensity: 0.6"
            ></a-plane>
            <!-- Glass content layer (dark) -->
            <a-plane
              width="0.88"
              height="0.60"
              position="0 0 0.01"
              color="#0a0e27"
              opacity="0.88"
              material="shader: flat; transparent: true; depthTest: false; emissive: #1a2847; emissiveIntensity: 0.4"
            ></a-plane>
            <!-- Neon accent top bar (bright cyan) -->
            <a-plane
              width="0.88"
              height="0.04"
              position="0 0.28 0.02"
              color="#00ffff"
              opacity="1"
              material="shader: flat; emissive: #00ffff; emissiveIntensity: 0.8; depthTest: false"
            ></a-plane>
            <!-- Left accent bar (neon magenta) -->
            <a-plane
              width="0.04"
              height="0.60"
              position="-0.46 0 0.02"
              color="#ff00ff"
              opacity="0.8"
              material="shader: flat; emissive: #ff00ff; emissiveIntensity: 0.7; depthTest: false"
            ></a-plane>
            <!-- Level text -->
            <a-text
              id="hud-level"
              value="Level 1"
              position="0.05 0.16 0.03"
              align="center"
              color="#ffd43b"
              scale="0.8 0.8 0.8"
              font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            ></a-text>
            <!-- Progress text -->
            <a-text
              id="hud-progress"
              value="0/3"
              position="0.05 0.01 0.03"
              align="center"
              color="#ff6b9d"
              scale="0.75 0.75 0.75"
            ></a-text>
            <!-- Mode label -->
            <a-text
              id="hud-mode"
              value="EASY"
              position="0.05 -0.11 0.03"
              align="center"
              color="#69db7c"
              scale="0.65 0.65 0.65"
              font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            ></a-text>
            <!-- Timer row (hidden by default) -->
            <a-entity
              id="hud-timer-row"
              position="0 -0.22 0.02"
              visible="false"
            >
              <a-text
                value="TIME"
                position="-0.08 0 0"
                align="right"
                color="#48e5a0"
                scale="0.6 0.6 0.6"
                font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
              ></a-text>
              <a-text
                id="timer-text"
                value="--"
                position="0.05 0 0"
                align="left"
                color="#00ffff"
                scale="0.65 0.65 0.65"
                font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
              ></a-text>
            </a-entity>
          </a-entity>
        </a-entity>

        <a-entity
          id="left-hand"
          laser-controls="hand: left"
          raycaster="objects: .interactive; far: 10"
          line="color: #74c0fc; opacity: 0.7"
          grabber
        ></a-entity>

        <a-entity
          id="right-hand"
          laser-controls="hand: right"
          raycaster="objects: .interactive; far: 10"
          line="color: #ff8787; opacity: 0.7"
          grabber
        ></a-entity>
      </a-entity>

      <a-entity
        id="shelf"
        color-shelf
        position="0 0 -0.98"
        visible="false"
      ></a-entity>
      <a-entity id="balls-container" visible="false"></a-entity>
      <a-entity id="particle-pool"></a-entity>
      <a-entity ambient-particles></a-entity>

      <a-entity
        id="color-wheel"
        color-wheel="radius: 1.12; level: 1"
        position="0 1.34 -2.22"
        rotation="-1 0 0"
        visible="false"
      ></a-entity>

      <a-entity id="ui-container">
        <a-entity
          id="menu-panel"
          position="0 1.72 -2.45"
          visible="true"
          billboard
        >
          <a-plane
            width="3.36"
            height="2.81"
            color="#4dabf7"
            opacity="0.2"
            material="shader: flat; transparent: true; depthTest: false"
          ></a-plane>
          <a-plane
            width="3.2"
            height="2.65"
            color="#080e1f"
            opacity="1"
            material="shader: flat"
          ></a-plane>
          <a-text
            value="VR COLOR CIRCLE"
            position="0 0.92 0.01"
            align="center"
            color="#ffd166"
            width="5.2"
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
          ></a-text>
          <a-text
            value="Sort colors by level in a floating wheel"
            position="0 0.56 0.01"
            align="center"
            color="#d0d7ff"
            width="2.3"
          ></a-text>
          <a-entity
            id="btn-easy"
            position="-0.56 0.04 0.02"
            vr-button="label: EASY; action: start-easy; bgColor: #2f9e44"
          ></a-entity>
          <a-entity
            id="btn-hard"
            position="0.56 0.04 0.02"
            vr-button="label: HARD; action: start-hard; bgColor: #e03131"
          ></a-entity>
          <a-entity
            id="btn-freeplay"
            position="-0.56 -0.52 0.02"
            vr-button="label: FREE PLAY; action: start-freeplay; bgColor: #1971c2"
          ></a-entity>
          <a-entity
            id="btn-leaderboard"
            position="0.56 -0.52 0.02"
            vr-button="label: LEADERBOARD; action: show-leaderboard; bgColor: #5f3dc4"
          ></a-entity>
        </a-entity>

        <a-entity
          id="leaderboard-panel"
          position="0 1.72 -2.45"
          visible="false"
          billboard
        >
          <a-plane
            width="3.71"
            height="2.86"
            color="#5f3dc4"
            opacity="0.08"
            material="shader: flat; transparent: true; depthTest: false"
          ></a-plane>
          <a-plane
            width="3.55"
            height="2.7"
            color="#102247"
            opacity="1"
            material="shader: flat"
          ></a-plane>
          <a-text
            value="LEADERBOARD"
            position="0 0.98 0.01"
            align="center"
            color="#ffd43b"
            width="3.1"
          ></a-text>
          <a-text
            id="lb-easy-scores"
            value="EASY&#10;---"
            position="-0.82 0.25 0.01"
            align="left"
            color="#51cf66"
            width="1.7"
          ></a-text>
          <a-text
            id="lb-hard-scores"
            value="HARD&#10;---"
            position="0.82 0.25 0.01"
            align="left"
            color="#ff6b6b"
            width="1.7"
          ></a-text>
          <a-entity
            id="btn-lb-back"
            position="0 -0.9 0.02"
            vr-button="label: BACK; action: back-menu; bgColor: #364fc7"
          ></a-entity>
        </a-entity>

        <a-entity
          id="victory-panel"
          position="0 1.82 -2.55"
          visible="false"
          billboard
        >
          <a-plane
            width="3.36"
            height="2.41"
            color="#ffd43b"
            emissive="#ffd43b"
            emissiveIntensity="0.1"
            opacity="0.1"
            material="shader: flat; transparent: true; depthTest: false"
          ></a-plane>
          <a-plane
            width="3.2"
            height="2.25"
            color="#0b3658"
            opacity="1"
            material="shader: flat"
          ></a-plane>
          <a-text
            value="CONGRATULATIONS!"
            position="0 0.72 0.01"
            align="center"
            color="#ffd43b"
            width="3.2"
          ></a-text>
          <a-text
            id="victory-time"
            value="Total Time: --"
            position="0 0.22 0.01"
            align="center"
            color="#ffffff"
            width="2.2"
          ></a-text>
          <a-text
            id="victory-mode"
            value="Mode: --"
            position="0 -0.08 0.01"
            align="center"
            color="#d0d7ff"
            width="2"
          ></a-text>
          <a-entity
            id="btn-replay"
            position="-0.56 -0.72 0.02"
            vr-button="label: REPLAY; action: replay; bgColor: #2b8a3e"
          ></a-entity>
          <a-entity
            id="btn-menu"
            position="0.56 -0.72 0.02"
            vr-button="label: MENU; action: back-menu; bgColor: #495057"
          ></a-entity>
        </a-entity>

        <a-entity
          id="gameover-panel"
          position="0 1.82 -2.55"
          visible="false"
          billboard
        >
          <a-plane
            width="3.36"
            height="2.31"
            color="#e03131"
            emissive="#e03131"
            emissiveIntensity="0.08"
            opacity="0.1"
            material="shader: flat; transparent: true; depthTest: false"
          ></a-plane>
          <a-plane
            width="3.2"
            height="2.15"
            color="#4a0d0d"
            opacity="1"
            material="shader: flat"
          ></a-plane>
          <a-text
            value="TIME'S UP!"
            position="0 0.7 0.01"
            align="center"
            color="#ff8787"
            width="3.4"
          ></a-text>
          <a-text
            id="gameover-level"
            value="Level: --"
            position="0 0.18 0.01"
            align="center"
            color="#ffffff"
            width="2.2"
          ></a-text>
          <a-text
            id="gameover-mode"
            value="Mode: --"
            position="0 -0.1 0.01"
            align="center"
            color="#d0d7ff"
            width="2"
          ></a-text>
          <a-entity
            id="btn-retry"
            position="-0.56 -0.72 0.02"
            vr-button="label: RETRY; action: retry-level; bgColor: #f08c00"
          ></a-entity>
          <a-entity
            id="btn-gameover-menu"
            position="0.56 -0.72 0.02"
            vr-button="label: MENU; action: back-menu; bgColor: #495057"
          ></a-entity>
        </a-entity>

        <a-entity
          id="freeplay-panel"
          position="1.98 1.66 -2.28"
          visible="false"
          billboard
        >
          <a-plane
            width="1.61"
            height="1.28"
            color="#4dabf7"
            emissive="#4dabf7"
            emissiveIntensity="0.08"
            opacity="0.1"
            material="shader: flat; transparent: true; depthTest: false"
          ></a-plane>
          <a-plane
            width="1.45"
            height="1.12"
            color="#15233f"
            opacity="0.92"
            material="shader: flat"
          ></a-plane>
          <a-text
            value="FREE PLAY"
            position="0 0.34 0.01"
            align="center"
            color="#74c0fc"
            width="1.6"
          ></a-text>
          <a-text
            value="Explore all 12 colors"
            position="0 0.08 0.01"
            align="center"
            color="#e7f5ff"
            width="1.1"
          ></a-text>
          <a-entity
            id="btn-reset-freeplay"
            position="0 -0.22 0.02"
            vr-button="label: RESET; action: reset-freeplay; width: 0.86; bgColor: #1971c2"
          ></a-entity>
          <a-entity
            id="btn-freeplay-menu"
            position="0 -0.56 0.02"
            vr-button="label: MENU; action: back-menu; width: 0.86; bgColor: #495057"
          ></a-entity>
        </a-entity>

        <a-entity
          id="status-panel"
          position="0 2.74 -2.34"
          visible="false"
          billboard
        >
          <a-plane
            width="2.21"
            height="0.6"
            color="#4dabf7"
            emissive="#4dabf7"
            emissiveIntensity="0.06"
            opacity="0.1"
            material="shader: flat; transparent: true; depthTest: false"
          ></a-plane>
          <a-plane
            width="2.05"
            height="0.44"
            color="#101828"
            opacity="0.92"
            material="shader: flat; depthTest: false"
          ></a-plane>
          <a-text
            id="status-text"
            value=""
            position="0 0 0.01"
            align="center"
            color="#ffffff"
            width="2.05"
          ></a-text>
        </a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
